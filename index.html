<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网页</title>
    <style>
        /* 基础页面样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* 页头样式 */
        header {
            background-color: #4A90E2;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* 主体内容样式 */
        main {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 按钮组件样式 */
        .btn {
            display: inline-block;
            background-color: #4A90E2;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #357ABD;
        }

        /* 页脚样式 */
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- 头部区域 -->
    <header>
        <h1>欢迎来到我的网页</h1>
        <p>这是一个使用 HTML5 和 CSS3 构建 circulation 的响应式模版</p>
    </header>

    <!-- 主要内容区域 -->
    <main>
        <h2>关于这个页面</h2>
        <p>这个网页已经为你配置好了基础的代码结构，具备良好的可读性和手机端自适应能力。你可以在此基础上随意修改文字、添加图片或调整颜色。</p>
        
        <h3>核心特点：</h3>
        <ul>
            <li><strong>响应式设计：</strong> 无论在电脑还是手机上都能完美显示。</li>
            <li><strong>现代字体集：</strong> 自动适配主流操作系统的原生无衬线字体。</li>
            <li><strong>结构清晰：</strong> 语义化标签（header, main, footer）更利于 SEO。</li>
        </ul>

        <p>点击下方的按钮可以了解更多前端开发的知识：</p>
        <a href="https://developer.mozilla.org/zh-CN/" target="_blank" class="btn">访问 MDN Web 文档</a>
    </main>

    <!-- 页脚区域 -->
    <footer>
        <p>© 2026 我的网站. 保留所有权利。</p>
    </footer>

</body>
</html>
